services:
  cursorcli2api:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - CODEX_PROVIDER=cursor-agent
      - CODEX_PRESET=cursor-auto
      - CODEX_GATEWAY_HOST=0.0.0.0
    volumes:
      - cursor-data:/root/.cursor-agent
    restart: unless-stopped

volumes:
  cursor-data:
